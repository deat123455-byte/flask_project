<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Секретная База Данных{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #00d4ff;
        }
        
        header h1 {
            text-align: center;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.8em;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .nav-links a:hover {
            background: rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .flash-messages {
            margin-bottom: 20px;
        }
        
        .flash {
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .flash.success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        
        .flash.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .flash.warning {
            background: rgba(255, 187, 0, 0.2);
            border: 1px solid #ffbb00;
            color: #ffbb00;
        }
        
        .flash.info {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }
        
        .flash.danger {
            background: rgba(255, 0, 85, 0.3);
            border: 2px solid #ff0055;
            color: #ff0055;
            font-weight: bold;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffbb00, #cc9900);
            color: #1a1a2e;
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 187, 0, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        
        tr:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box input,
        .search-box select {
            padding: 10px 15px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }
        
        .search-box input:focus,
        .search-box select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        
        .agent-detail {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid #00d4ff;
        }
        
        .detail-item label {
            color: #00d4ff;
            font-size: 0.85em;
            text-transform: uppercase;
        }
        
        .detail-item p {
            font-size: 1.2em;
            margin-top: 5px;
        }
        
        .access-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .access-secret { background: rgba(0, 212, 255, 0.3); color: #00d4ff; }
        .access-top-secret { background: rgba(255, 187, 0, 0.3); color: #ffbb00; }
        .access-ultra { background: rgba(255, 68, 68, 0.3); color: #ff4444; }
        .access-special { background: rgba(0, 255, 136, 0.3); color: #00ff88; }
        
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nuke-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 0, 85, 0.1);
            border: 2px dashed #ff0055;
            border-radius: 10px;
            text-align: center;
        }
        
        .nuke-section h3 {
            color: #ff0055;
            margin-bottom: 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state h2 {
            color: #444;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.3em;
            }
            
            .nav-links {
                flex-wrap: wrap;
            }
            
            table {
                font-size: 0.9em;
            }
            
            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🕵️ Секретная База Данных Агентов</h1>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}">📋 Все агенты</a>
                <a href="{{ url_for('add_agent') }}">➕ Добавить агента</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>

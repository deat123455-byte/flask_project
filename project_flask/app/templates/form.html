<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весёлая форма</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <h1 class="funny-title">😄 Введите ваши данные! 🦄</h1>
    
    <form action="/submit" method="POST" class="funny-form" id="mainForm">
        <label for="name">Ваше суперское имя:</label>
        <input type="text" id="name" name="name" required placeholder="Например, Алексей">
        
        <label for="email">Ваш потрясающий email:</label>
        <input type="email" id="email" name="email" required placeholder="example@mail.ru">
        
        <!-- Поле выбора цвета -->
        <label for="color">Любимый цвет:</label>
        <div class="color-picker-wrapper">
            <input type="color" id="color" name="color" value="#3498db">
            <div class="color-preview" id="colorPreview"></div>
        </div>
        
        <!-- Выпадающий список профессий -->
        <label for="profession">Ваша профессия:</label>
        <select id="profession" name="profession" required>
            <option value="" disabled selected>Выберите профессию</option>
            <option value="developer">Разработчик</option>
            <option value="designer">Дизайнер</option>
            <option value="manager">Менеджер</option>
            <option value="analyst">Аналитик</option>
            <option value="tester">Тестировщик</option>
            <option value="devops">DevOps</option>
            <option value="student">Студент</option>
            <option value="other">Другое</option>
        </select>
        
        <!-- Чекбоксы увлечений -->
        <label>Увлечения:</label>
        <div class="checkboxes-wrapper">
            <label class="custom-checkbox">
                <input type="checkbox" name="hobbies" value="books">
                <span class="checkmark">📚</span>
                Книги
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="hobbies" value="sport">
                <span class="checkmark">⚽</span>
                Спорт
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="hobbies" value="games">
                <span class="checkmark">🎮</span>
                Игры
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="hobbies" value="music">
                <span class="checkmark">🎵</span>
                Музыка
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="hobbies" value="travel">
                <span class="checkmark">✈️</span>
                Путешествия
            </label>
        </div>
        
        <!-- Переключатель типа пользователя -->
        <label>Тип пользователя:</label>
        <div class="radio-wrapper">
            <label class="custom-radio">
                <input type="radio" name="user_type" value="newbie" checked>
                <span class="radio-mark">🌱</span>
                Новичок
            </label>
            <label class="custom-radio">
                <input type="radio" name="user_type" value="advanced">
                <span class="radio-mark">🚀</span>
                Продвинутый
            </label>
            <label class="custom-radio">
                <input type="radio" name="user_type" value="pro">
                <span class="radio-mark">👑</span>
                Профи
            </label>
        </div>
        
        <!-- Кнопка отправки -->
        <button type="submit" class="funny-button">🚀 Поехали!</button>
        
        <!-- Кнопка-сюрприз -->
        <button type="button" class="surprise-button" id="surpriseBtn">🎁 Нажми меня!</button>
    </form>
    
    <!-- Скрытые сюрприз элементы -->
    <div id="surpriseContent" class="surprise-content" style="display: none;">
        <p class="surprise-message">🎉 Ты нашёл секретную кнопку! Поздравляем! 🎉</p>
        <div class="extra-fun">🦄✨🌈</div>
    </div>
    
    <script>
        // Превью цвета
        const colorInput = document.getElementById('color');
        const colorPreview = document.getElementById('colorPreview');
        
        colorInput.addEventListener('input', function() {
            colorPreview.style.backgroundColor = this.value;
        });
        
        // Инициализация превью
        colorPreview.style.backgroundColor = colorInput.value;
        
        // Кнопка-сюрприз
        const surpriseBtn = document.getElementById('surpriseBtn');
        const surpriseContent = document.getElementById('surpriseContent');
        const funnyForm = document.querySelector('.funny-form');
        
        surpriseBtn.addEventListener('click', function() {
            surpriseContent.style.display = 'block';
            funnyForm.classList.add('shake');
            setTimeout(() => {
                funnyForm.classList.remove('shake');
            }, 500);
        });
        
        // Анимация убегающей кнопки (опционально)
        surpriseBtn.addEventListener('mouseenter', function() {
            if (Math.random() > 0.7) {
                const randomX = (Math.random() - 0.5) * 100;
                const randomY = (Math.random() - 0.5) * 50;
                this.style.transform = `translate(${randomX}px, ${randomY}px)`;
            }
        });
        
        // Валидация с весёлыми сообщениями
        const form = document.getElementById('mainForm');
        form.addEventListener('submit', function(e) {
            const nameInput = document.getElementById('name');
            if (!nameInput.value.trim()) {
                e.preventDefault();
                alert('🤡 Мы не можем обработать форму без вашего имени, мистер Аноним!');
                nameInput.focus();
            }
        });
    </script>
</body>
</html>
